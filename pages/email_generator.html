---
layout: med
title: Source Email Generator
---

<div class="college" style="max-width: 900px; margin: 40px auto; padding: 20px;">
  <h2 style="margin-top: 0;">Source Email Generator</h2>
  <h3 style="font-weight: normal; margin-bottom: 20px;">
    Fill in the links below, then copy the email and paste it into your email client.
  </h3>

  <div style="display: grid; gap: 12px;">
    <label>
      Recipient name
      <input id="recipientName" type="text" placeholder="Optional"
        style="width: 100%; padding: 10px; font-size: 16px; border: 1px solid #000; border-radius: 6px;">
    </label>

    <label>
      Story link
      <input id="storyLink" type="url" placeholder="https://..."
        style="width: 100%; padding: 10px; font-size: 16px; border: 1px solid #000; border-radius: 6px;">
    </label>

    <label>
      Pay wall free version
      <input id="freeLink" type="url" placeholder="https://..."
        style="width: 100%; padding: 10px; font-size: 16px; border: 1px solid #000; border-radius: 6px;">
    </label>

    <label>
      PDF version
      <input id="pdfLink" type="url" placeholder="https://..."
        style="width: 100%; padding: 10px; font-size: 16px; border: 1px solid #000; border-radius: 6px;">
    </label>

    <label>
      LinkedIn post
      <input id="linkedinLink" type="url" placeholder="https://..."
        style="width: 100%; padding: 10px; font-size: 16px; border: 1px solid #000; border-radius: 6px;">
    </label>

    <label>
      Instagram post
      <input id="instagramLink" type="url" placeholder="https://..."
        style="width: 100%; padding: 10px; font-size: 16px; border: 1px solid #000; border-radius: 6px;">
    </label>

    <label>
      Facebook post
      <input id="facebookLink" type="url" placeholder="https://..."
        style="width: 100%; padding: 10px; font-size: 16px; border: 1px solid #000; border-radius: 6px;">
    </label>

    <label>
      Twitter/X post
      <input id="twitterLink" type="url" placeholder="https://..."
        style="width: 100%; padding: 10px; font-size: 16px; border: 1px solid #000; border-radius: 6px;">
    </label>
  </div>

  <div style="margin-top: 18px; display: flex; gap: 10px; flex-wrap: wrap;">
    <button onclick="copyEmail()" class="filter-btn">Copy email</button>
    <button onclick="selectPreview()" class="filter-btn">Select preview</button>
    <button onclick="clearForm()" class="filter-btn">Clear</button>
  </div>

  <hr style="margin: 24px 0; border: none; border-top: 1px solid #000;">

  <h3 style="margin-bottom: 10px;">Preview</h3>

  <div
    id="emailPreview"
    contenteditable="true"
    style="
      font-family: 'Times New Roman', Times, serif;
      font-size: 12pt;
      line-height: 1.4;
      border: 1px solid #000;
      border-radius: 6px;
      padding: 18px;
      background: #fff;
      min-height: 320px;
    "
  ></div>

  <p id="copyStatus" style="margin-top: 12px;"></p>
</div>

<script>
  const fieldIds = [
    "recipientName",
    "storyLink",
    "freeLink",
    "pdfLink",
    "linkedinLink",
    "instagramLink",
    "facebookLink",
    "twitterLink"
  ];

  fieldIds.forEach(id => {
    document.getElementById(id).addEventListener("input", updatePreview);
  });

  function escapeHtml(str) {
    return (str || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function safeLink(url, label) {
    const cleanUrl = (url || "").trim();
    if (!cleanUrl) return escapeHtml(label);

    const escapedUrl = escapeHtml(cleanUrl);
    const escapedLabel = escapeHtml(label);

    return `<a href="${escapedUrl}" target="_blank" rel="noopener noreferrer">${escapedLabel}</a>`;
  }

  function updatePreview() {
    const recipientName = document.getElementById("recipientName").value.trim();
    const storyLink = document.getElementById("storyLink").value.trim();
    const freeLink = document.getElementById("freeLink").value.trim();
    const pdfLink = document.getElementById("pdfLink").value.trim();
    const linkedinLink = document.getElementById("linkedinLink").value.trim();
    const instagramLink = document.getElementById("instagramLink").value.trim();
    const facebookLink = document.getElementById("facebookLink").value.trim();
    const twitterLink = document.getElementById("twitterLink").value.trim();

    const greeting = recipientName
      ? `Hello ${escapeHtml(recipientName)},`
      : "Hello,";

    const preview = `
      <div>${greeting}</div>
      <br>
      <div>Thank you again for taking the time to speak with me. I really appreciate it. I wanted to share the story now that it’s live.</div>
      <br>
      <div>You can read it ${safeLink(storyLink, "here")}. ${safeLink(freeLink, "Here")} is a paywall-free version and ${safeLink(pdfLink, "PDF copy")} as well.</div>
      <br>
      <div>I’ve shared it on social media too, in case you’d like to take a look or reshare:</div>
      <ul style="margin-top: 6px; margin-bottom: 0; padding-left: 22px;">
        <li>${safeLink(linkedinLink, "LinkedIn")}</li>
        <li>${safeLink(instagramLink, "Instagram")}</li>
        <li>${safeLink(facebookLink, "Facebook")}</li>
        <li>${safeLink(twitterLink, "Twitter/X")}</li>
      </ul>
      <br>
      <div>Thank you again for your time and for trusting me with your story.</div>
      <br>
      <div>Best,</div>
      <div>Michal</div>
    `;

    document.getElementById("emailPreview").innerHTML = preview;
  }

  function selectPreview() {
    const preview = document.getElementById("emailPreview");
    const range = document.createRange();
    range.selectNodeContents(preview);

    const selection = window.getSelection();
    selection.removeAllRanges();
    selection.addRange(range);
  }

  async function copyEmail() {
    const preview = document.getElementById("emailPreview");
    const status = document.getElementById("copyStatus");

    try {
      if (navigator.clipboard && window.ClipboardItem) {
        const html = preview.innerHTML;
        const text = preview.innerText;

        const item = new ClipboardItem({
          "text/html": new Blob([html], { type: "text/html" }),
          "text/plain": new Blob([text], { type: "text/plain" })
        });

        await navigator.clipboard.write([item]);
        status.textContent = "Copied.";
      } else {
        selectPreview();
        document.execCommand("copy");
        status.textContent = "Copied.";
      }
    } catch (err) {
      status.textContent = "Copy failed. Use Select preview, then copy manually.";
    }
  }

  function clearForm() {
    fieldIds.forEach(id => {
      document.getElementById(id).value = "";
    });
    updatePreview();
    document.getElementById("copyStatus").textContent = "";
  }

  updatePreview();
</script>
